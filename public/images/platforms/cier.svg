<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="CIER — Corps principal">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#050308"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6A7"/>
      <stop offset="100%" stop-color="#92721A"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F5E6A7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="190" rx="380" ry="220" fill="url(#halo)"/>
  <polygon points="380,0 420,0 440,500 360,500" fill="url(#beam)" opacity="0.55"/>
  <!-- Cathedral arches -->
  <g opacity="0.85">
    <path d="M 200 500 L 200 280 Q 200 200 260 200 Q 320 200 320 280 L 320 500 Z" fill="#0a0613" stroke="url(#gold)" stroke-width="1" stroke-opacity="0.35"/>
    <path d="M 480 500 L 480 280 Q 480 200 540 200 Q 600 200 600 280 L 600 500 Z" fill="#0a0613" stroke="url(#gold)" stroke-width="1" stroke-opacity="0.35"/>
    <path d="M 320 500 L 320 220 Q 320 120 400 120 Q 480 120 480 220 L 480 500 Z" fill="#070512" stroke="url(#gold)" stroke-width="1.5" stroke-opacity="0.55"/>
  </g>
  <!-- Cross -->
  <g transform="translate(400 240)" fill="url(#gold)">
    <rect x="-6" y="-50" width="12" height="120" rx="2"/>
    <rect x="-32" y="-22" width="64" height="12" rx="2"/>
  </g>
  <!-- Particles -->
  <g fill="#F5E6A7" opacity="0.7">
    <circle cx="160" cy="120" r="1.5"/><circle cx="640" cy="100" r="1.5"/>
    <circle cx="240" cy="60" r="1"/><circle cx="560" cy="50" r="1"/>
    <circle cx="120" cy="280" r="1"/><circle cx="680" cy="280" r="1"/>
  </g>
</svg>

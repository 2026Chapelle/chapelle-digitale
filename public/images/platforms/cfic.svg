<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="CFIC — Académie biblique">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#2a1a4a"/>
      <stop offset="100%" stop-color="#0a0613"/>
    </radialGradient>
    <radialGradient id="violet" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5E6A7"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <radialGradient id="lightBeam" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#F5E6A7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F5E6A7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="280" rx="400" ry="240" fill="url(#violet)"/>

  <!-- Open book -->
  <g transform="translate(400 280)">
    <!-- Page shadow -->
    <ellipse cx="0" cy="80" rx="220" ry="20" fill="#000" opacity="0.4"/>
    <!-- Left page -->
    <path d="M -180 -90 Q -180 -110 -160 -110 L -10 -100 L -10 80 L -180 70 Z" fill="url(#page)"/>
    <!-- Right page -->
    <path d="M 180 -90 Q 180 -110 160 -110 L 10 -100 L 10 80 L 180 70 Z" fill="url(#page)"/>
    <!-- Spine -->
    <rect x="-12" y="-105" width="24" height="185" fill="url(#cover)"/>
    <!-- Page lines -->
    <g stroke="#92721A" stroke-width="1.2" opacity="0.4">
      <line x1="-160" y1="-70" x2="-30" y2="-65"/>
      <line x1="-160" y1="-50" x2="-30" y2="-46"/>
      <line x1="-160" y1="-30" x2="-30" y2="-27"/>
      <line x1="-160" y1="-10" x2="-30" y2="-8"/>
      <line x1="-160" y1="10" x2="-30" y2="11"/>
      <line x1="-160" y1="30" x2="-30" y2="30"/>
      <line x1="30" y1="-65" x2="160" y2="-70"/>
      <line x1="30" y1="-46" x2="160" y2="-50"/>
      <line x1="30" y1="-27" x2="160" y2="-30"/>
      <line x1="30" y1="-8" x2="160" y2="-10"/>
      <line x1="30" y1="11" x2="160" y2="10"/>
      <line x1="30" y1="30" x2="160" y2="30"/>
    </g>
    <!-- Light beam from book -->
    <ellipse cx="0" cy="-160" rx="60" ry="80" fill="url(#lightBeam)"/>
  </g>

  <!-- Vertical light from book -->
  <polygon points="380,40 420,40 460,160 340,160" fill="#F5E6A7" opacity="0.2"/>

  <!-- Floating word particles -->
  <g fill="#F5E6A7" opacity="0.7">
    <circle cx="280" cy="120" r="1.5"/><circle cx="520" cy="110" r="1.5"/>
    <circle cx="320" cy="80" r="1"/><circle cx="480" cy="80" r="1"/>
    <circle cx="200" cy="180" r="1.2"/><circle cx="600" cy="180" r="1.2"/>
    <circle cx="350" cy="40" r="1"/><circle cx="450" cy="40" r="1"/>
  </g>
</svg>

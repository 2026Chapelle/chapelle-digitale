<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Cité du Refuge — maison et lumière">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0d2e2c"/>
      <stop offset="100%" stop-color="#040a0a"/>
    </radialGradient>
    <radialGradient id="warm" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="house" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <radialGradient id="windowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FED7AA"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="280" rx="400" ry="240" fill="url(#warm)"/>

  <!-- Distant mountains -->
  <g fill="#0F766E" opacity="0.45">
    <polygon points="0,400 150,260 300,380 450,240 600,360 800,280 800,500 0,500"/>
  </g>

  <!-- House -->
  <g transform="translate(400 320)">
    <!-- Roof -->
    <polygon points="-130,-20 0,-130 130,-20" fill="url(#house)"/>
    <!-- Body -->
    <rect x="-110" y="-20" width="220" height="160" fill="#134E4A" stroke="url(#house)" stroke-width="2"/>
    <!-- Door -->
    <rect x="-25" y="60" width="50" height="80" fill="#0a0408"/>
    <rect x="-25" y="60" width="50" height="80" fill="url(#windowGlow)" opacity="0.7"/>
    <!-- Windows -->
    <rect x="-90" y="10" width="50" height="35" fill="url(#windowGlow)"/>
    <rect x="40" y="10" width="50" height="35" fill="url(#windowGlow)"/>
    <!-- Cross above -->
    <rect x="-3" y="-180" width="6" height="50" fill="url(#house)"/>
    <rect x="-15" y="-160" width="30" height="6" fill="url(#house)"/>
  </g>

  <!-- Light shaft from sky -->
  <polygon points="380,40 420,40 440,260 360,260" fill="#FED7AA" opacity="0.18"/>

  <!-- Stars -->
  <g fill="#5EEAD4" opacity="0.7">
    <circle cx="120" cy="100" r="1.5"/><circle cx="680" cy="120" r="1.5"/>
    <circle cx="200" cy="60" r="1"/><circle cx="600" cy="60" r="1"/>
    <circle cx="100" cy="180" r="1"/><circle cx="700" cy="180" r="1"/>
    <circle cx="300" cy="40" r="1.2"/><circle cx="500" cy="40" r="1.2"/>
  </g>
</svg>

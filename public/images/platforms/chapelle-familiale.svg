<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Chapelle Familiale">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#3a1a0a"/>
      <stop offset="100%" stop-color="#0a0408"/>
    </radialGradient>
    <radialGradient id="warm" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="280" rx="380" ry="220" fill="url(#warm)"/>
  <!-- Stylized hearth / flame -->
  <g transform="translate(400 280)" fill="url(#accent)" opacity="0.85">
    <path d="M 0 -90 Q -40 -40 -40 0 Q -40 50 0 60 Q 40 50 40 0 Q 40 -40 0 -90 Z"/>
    <path d="M 0 -50 Q -20 -25 -20 5 Q -20 30 0 35 Q 20 30 20 5 Q 20 -25 0 -50 Z" fill="#FED7AA" opacity="0.6"/>
  </g>
  <!-- Family silhouettes around -->
  <g fill="#0a0408">
    <!-- Adult left -->
    <circle cx="260" cy="320" r="22"/>
    <rect x="240" y="338" width="40" height="80" rx="8"/>
    <!-- Adult right -->
    <circle cx="540" cy="320" r="22"/>
    <rect x="520" y="338" width="40" height="80" rx="8"/>
    <!-- Child left -->
    <circle cx="320" cy="370" r="14"/>
    <rect x="307" y="384" width="26" height="50" rx="6"/>
    <!-- Child right -->
    <circle cx="480" cy="370" r="14"/>
    <rect x="467" y="384" width="26" height="50" rx="6"/>
    <!-- Toddler -->
    <circle cx="400" cy="395" r="12"/>
    <rect x="389" y="407" width="22" height="40" rx="5"/>
  </g>
  <!-- Sparks rising -->
  <g fill="#FED7AA" opacity="0.8">
    <circle cx="400" cy="160" r="2"/>
    <circle cx="380" cy="120" r="1.5"/>
    <circle cx="425" cy="140" r="1.5"/>
    <circle cx="370" cy="80" r="1"/>
    <circle cx="430" cy="90" r="1"/>
    <circle cx="395" cy="50" r="1.5"/>
  </g>
</svg>

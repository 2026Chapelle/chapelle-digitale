<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Jeunesse — feu de la génération">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#2a1145"/>
      <stop offset="100%" stop-color="#050308"/>
    </radialGradient>
    <linearGradient id="electric" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8B4FE"/>
      <stop offset="50%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <radialGradient id="firePulse" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#9333EA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9333EA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="250" rx="400" ry="260" fill="url(#firePulse)"/>

  <!-- Lightning bolts -->
  <g fill="url(#electric)" opacity="0.95">
    <polygon points="380,80 440,80 410,210 470,210 380,420 410,290 350,290"/>
  </g>
  <!-- Glow under bolt -->
  <ellipse cx="410" cy="380" rx="120" ry="40" fill="#EF4444" opacity="0.35"/>

  <!-- Particles / sparks -->
  <g fill="#D8B4FE" opacity="0.85">
    <circle cx="180" cy="120" r="2"/><circle cx="240" cy="80" r="1.5"/>
    <circle cx="600" cy="100" r="2"/><circle cx="650" cy="160" r="1.5"/>
    <circle cx="120" cy="280" r="1.5"/><circle cx="700" cy="260" r="1.5"/>
    <circle cx="200" cy="380" r="1.5"/><circle cx="600" cy="390" r="2"/>
  </g>
  <g fill="#FCA5A5" opacity="0.7">
    <circle cx="330" cy="200" r="3"/>
    <circle cx="490" cy="220" r="3"/>
    <circle cx="290" cy="320" r="2.5"/>
    <circle cx="510" cy="330" r="2.5"/>
  </g>

  <!-- Diagonal accent strokes (motion lines) -->
  <g stroke="#9333EA" stroke-width="2" stroke-opacity="0.4" fill="none">
    <path d="M 100 450 L 200 380"/>
    <path d="M 600 380 L 700 450"/>
    <path d="M 80 380 L 160 320"/>
    <path d="M 640 320 L 720 380"/>
  </g>
</svg>

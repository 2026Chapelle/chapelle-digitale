<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Familles de la Chapelle — cellules connectées">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0a3a1a"/>
      <stop offset="100%" stop-color="#040a06"/>
    </radialGradient>
    <radialGradient id="green" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <radialGradient id="nodeCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="250" rx="400" ry="240" fill="url(#green)"/>

  <!-- Connection lines first (under nodes) -->
  <g stroke="url(#node)" stroke-width="1.5" stroke-opacity="0.5" fill="none" stroke-dasharray="3 4">
    <!-- Center to outer -->
    <line x1="400" y1="250" x2="220" y2="140"/>
    <line x1="400" y1="250" x2="580" y2="140"/>
    <line x1="400" y1="250" x2="140" y2="280"/>
    <line x1="400" y1="250" x2="660" y2="280"/>
    <line x1="400" y1="250" x2="220" y2="400"/>
    <line x1="400" y1="250" x2="580" y2="400"/>
    <line x1="400" y1="250" x2="400" y2="100"/>
    <line x1="400" y1="250" x2="400" y2="420"/>
    <!-- Outer perimeter -->
    <path d="M 220 140 Q 320 100 400 100 Q 480 100 580 140 Q 680 220 660 280 Q 660 360 580 400 Q 480 440 400 420 Q 320 440 220 400 Q 120 360 140 280 Q 120 220 220 140 Z"/>
  </g>

  <!-- Center node (large, gold-tinted) -->
  <g transform="translate(400 250)">
    <circle r="42" fill="url(#nodeCenter)" opacity="0.35"/>
    <circle r="32" fill="url(#nodeCenter)"/>
    <text y="6" text-anchor="middle" font-family="Cinzel, serif" font-weight="900" font-size="22" fill="#0a0408">✦</text>
  </g>

  <!-- 8 outer nodes (people) -->
  <g>
    <g transform="translate(400 100)">
      <circle r="24" fill="url(#node)" opacity="0.4"/>
      <circle r="18" fill="url(#node)"/>
      <circle r="6" cy="-3" fill="#0a0408"/>
      <path d="M -8 4 Q -8 14 0 14 Q 8 14 8 4" stroke="#0a0408" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(220 140)">
      <circle r="22" fill="url(#node)" opacity="0.4"/>
      <circle r="16" fill="url(#node)"/>
      <circle r="5" cy="-3" fill="#0a0408"/>
    </g>
    <g transform="translate(580 140)">
      <circle r="22" fill="url(#node)" opacity="0.4"/>
      <circle r="16" fill="url(#node)"/>
      <circle r="5" cy="-3" fill="#0a0408"/>
    </g>
    <g transform="translate(140 280)">
      <circle r="22" fill="url(#node)" opacity="0.4"/>
      <circle r="16" fill="url(#node)"/>
      <circle r="5" cy="-3" fill="#0a0408"/>
    </g>
    <g transform="translate(660 280)">
      <circle r="22" fill="url(#node)" opacity="0.4"/>
      <circle r="16" fill="url(#node)"/>
      <circle r="5" cy="-3" fill="#0a0408"/>
    </g>
    <g transform="translate(220 400)">
      <circle r="22" fill="url(#node)" opacity="0.4"/>
      <circle r="16" fill="url(#node)"/>
      <circle r="5" cy="-3" fill="#0a0408"/>
    </g>
    <g transform="translate(580 400)">
      <circle r="22" fill="url(#node)" opacity="0.4"/>
      <circle r="16" fill="url(#node)"/>
      <circle r="5" cy="-3" fill="#0a0408"/>
    </g>
    <g transform="translate(400 420)">
      <circle r="22" fill="url(#node)" opacity="0.4"/>
      <circle r="16" fill="url(#node)"/>
      <circle r="5" cy="-3" fill="#0a0408"/>
    </g>
  </g>

  <!-- Sparkles -->
  <g fill="#86EFAC" opacity="0.7">
    <circle cx="100" cy="80" r="1.2"/><circle cx="700" cy="80" r="1.2"/>
    <circle cx="60" cy="200" r="1"/><circle cx="740" cy="200" r="1"/>
    <circle cx="80" cy="420" r="1"/><circle cx="720" cy="420" r="1"/>
  </g>
</svg>

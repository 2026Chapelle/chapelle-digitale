<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Femmes d'Exceptions — couronne et grâce">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#3a0a2c"/>
      <stop offset="100%" stop-color="#0a0408"/>
    </radialGradient>
    <radialGradient id="rose" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#831843"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6A7"/>
      <stop offset="100%" stop-color="#92721A"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="280" rx="400" ry="240" fill="url(#rose)"/>

  <!-- Crown -->
  <g transform="translate(400 200)" fill="url(#goldShine)">
    <rect x="-110" y="0" width="220" height="28" rx="3"/>
    <polygon points="-110,0 -85,-60 -55,0"/>
    <polygon points="-55,0 -25,-85 5,0"/>
    <polygon points="5,0 25,-110 55,0"/>
    <polygon points="55,0 85,-85 115,0"/>
    <polygon points="115,0 110,0 110,0 110,0"/>
    <!-- Jewels -->
    <circle cx="-85" cy="-60" r="7" fill="#EC4899"/>
    <circle cx="-15" cy="-85" r="7" fill="#EC4899"/>
    <circle cx="25" cy="-110" r="9" fill="#EC4899"/>
    <circle cx="85" cy="-85" r="7" fill="#EC4899"/>
    <!-- Band gem -->
    <circle cx="0" cy="14" r="6" fill="#EC4899"/>
  </g>

  <!-- Female silhouette below -->
  <g fill="#0a0408">
    <circle cx="400" cy="290" r="38"/>
    <path d="M 360 320 Q 360 380 400 380 Q 440 380 440 320 L 460 460 L 340 460 Z"/>
  </g>

  <!-- Decorative roses / orbs -->
  <g fill="url(#goldRose)" opacity="0.85">
    <circle cx="180" cy="380" r="14"/>
    <circle cx="180" cy="380" r="8" fill="#831843"/>
    <circle cx="620" cy="380" r="14"/>
    <circle cx="620" cy="380" r="8" fill="#831843"/>
    <circle cx="120" cy="240" r="6"/>
    <circle cx="680" cy="240" r="6"/>
  </g>

  <!-- Sparkles -->
  <g fill="#F9A8D4" opacity="0.85">
    <polygon points="220,140 226,156 220,172 214,156"/>
    <polygon points="580,140 586,156 580,172 574,156"/>
    <polygon points="280,80 284,90 280,100 276,90"/>
    <polygon points="520,80 524,90 520,100 516,90"/>
    <polygon points="400,40 405,52 400,64 395,52"/>
  </g>
</svg>

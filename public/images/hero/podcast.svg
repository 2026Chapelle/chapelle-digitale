<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Studio podcast — micro et ondes sonores">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="60%" stop-color="#0a0613"/>
      <stop offset="100%" stop-color="#050308"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5E6A7"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#92721A"/>
    </linearGradient>
    <linearGradient id="grille" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1227"/>
      <stop offset="100%" stop-color="#070512"/>
    </linearGradient>
    <pattern id="grilleMesh" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#D4AF37" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="450" rx="700" ry="450" fill="url(#glow)"/>

  <!-- Outer concentric sound waves -->
  <g stroke="url(#metal)" stroke-width="2" fill="none" opacity="0.55">
    <circle cx="800" cy="450" r="320" stroke-opacity="0.18" stroke-dasharray="6 8"/>
    <circle cx="800" cy="450" r="380" stroke-opacity="0.14" stroke-dasharray="4 10"/>
    <circle cx="800" cy="450" r="440" stroke-opacity="0.10" stroke-dasharray="3 12"/>
  </g>

  <!-- Studio microphone -->
  <g transform="translate(800 450)">
    <!-- Mic body / capsule -->
    <rect x="-90" y="-220" width="180" height="240" rx="90" fill="url(#grille)" stroke="url(#metal)" stroke-width="3"/>
    <!-- Mesh grille -->
    <rect x="-72" y="-205" width="144" height="200" rx="72" fill="url(#grilleMesh)"/>
    <!-- Mesh ring lines -->
    <g stroke="url(#metal)" stroke-width="1.5" opacity="0.55" fill="none">
      <line x1="-72" y1="-150" x2="72" y2="-150"/>
      <line x1="-72" y1="-100" x2="72" y2="-100"/>
      <line x1="-72" y1="-50" x2="72" y2="-50"/>
    </g>
    <!-- Mic neck -->
    <rect x="-25" y="20" width="50" height="60" rx="8" fill="url(#metal)"/>
    <!-- Shock mount yoke -->
    <ellipse cx="0" cy="-100" rx="115" ry="160" fill="none" stroke="url(#metal)" stroke-width="3" stroke-opacity="0.7"/>
    <!-- Stand top -->
    <rect x="-50" y="80" width="100" height="20" rx="4" fill="url(#metal)"/>
    <!-- Stand pole -->
    <rect x="-8" y="100" width="16" height="180" fill="url(#metal)"/>
    <!-- Stand base -->
    <ellipse cx="0" cy="290" rx="100" ry="18" fill="url(#metal)"/>

    <!-- Recording LED -->
    <circle cx="0" cy="-100" r="6" fill="#EF4444" opacity="0.95"/>
    <circle cx="0" cy="-100" r="14" fill="#EF4444" opacity="0.25"/>
  </g>

  <!-- Animated waveform on left -->
  <g transform="translate(280 450)" stroke="url(#metal)" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <line x1="0" y1="-30" x2="0" y2="30"/>
    <line x1="20" y1="-60" x2="20" y2="60"/>
    <line x1="40" y1="-20" x2="40" y2="20"/>
    <line x1="60" y1="-90" x2="60" y2="90"/>
    <line x1="80" y1="-40" x2="80" y2="40"/>
    <line x1="100" y1="-110" x2="100" y2="110"/>
    <line x1="120" y1="-50" x2="120" y2="50"/>
    <line x1="140" y1="-80" x2="140" y2="80"/>
    <line x1="160" y1="-30" x2="160" y2="30"/>
    <line x1="180" y1="-60" x2="180" y2="60"/>
    <line x1="200" y1="-25" x2="200" y2="25"/>
    <line x1="220" y1="-95" x2="220" y2="95"/>
    <line x1="240" y1="-55" x2="240" y2="55"/>
  </g>

  <!-- Right waveform mirror -->
  <g transform="translate(1080 450)" stroke="url(#metal)" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <line x1="0" y1="-55" x2="0" y2="55"/>
    <line x1="20" y1="-95" x2="20" y2="95"/>
    <line x1="40" y1="-25" x2="40" y2="25"/>
    <line x1="60" y1="-60" x2="60" y2="60"/>
    <line x1="80" y1="-30" x2="80" y2="30"/>
    <line x1="100" y1="-80" x2="100" y2="80"/>
    <line x1="120" y1="-50" x2="120" y2="50"/>
    <line x1="140" y1="-110" x2="140" y2="110"/>
    <line x1="160" y1="-40" x2="160" y2="40"/>
    <line x1="180" y1="-90" x2="180" y2="90"/>
    <line x1="200" y1="-20" x2="200" y2="20"/>
    <line x1="220" y1="-60" x2="220" y2="60"/>
    <line x1="240" y1="-30" x2="240" y2="30"/>
  </g>

  <!-- Background light sparks -->
  <g fill="#F5E6A7" opacity="0.7">
    <circle cx="180" cy="200" r="2"/><circle cx="1420" cy="220" r="2"/>
    <circle cx="240" cy="120" r="1.5"/><circle cx="1360" cy="140" r="1.5"/>
    <circle cx="100" cy="380" r="1.5"/><circle cx="1500" cy="380" r="1.5"/>
    <circle cx="400" cy="80" r="1"/><circle cx="1200" cy="80" r="1"/>
    <circle cx="800" cy="80" r="1.5"/>
  </g>
</svg>

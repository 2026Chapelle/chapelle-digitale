<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Emblème royal CIER avec couronne et croix">
  <defs>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6A7"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#92721A"/>
    </linearGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#D4AF37" stop-opacity="0"/>
      <stop offset="80%" stop-color="#D4AF37" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#070512"/>
    </linearGradient>
    <filter id="emboss">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Outer glow rings -->
  <circle cx="400" cy="400" r="380" fill="url(#ringGlow)"/>
  <circle cx="400" cy="400" r="340" fill="none" stroke="url(#goldShine)" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="400" cy="400" r="320" fill="none" stroke="url(#goldShine)" stroke-width="0.8" stroke-opacity="0.35" stroke-dasharray="2 6"/>

  <!-- Decorative star points around -->
  <g fill="url(#goldShine)" opacity="0.7">
    <polygon points="400,40 408,60 400,80 392,60"/>
    <polygon points="760,400 740,408 720,400 740,392"/>
    <polygon points="400,760 392,740 400,720 408,740"/>
    <polygon points="40,400 60,392 80,400 60,408"/>
    <polygon points="654,146 660,160 654,174 648,160"/>
    <polygon points="654,654 648,640 654,626 660,640"/>
    <polygon points="146,654 140,640 146,626 152,640"/>
    <polygon points="146,146 152,160 146,174 140,160"/>
  </g>

  <!-- Shield -->
  <path d="M 400 130 L 600 200 L 600 460 Q 600 600 400 680 Q 200 600 200 460 L 200 200 Z"
    fill="url(#shieldGrad)" stroke="url(#goldShine)" stroke-width="3"/>

  <!-- Inner shield border -->
  <path d="M 400 160 L 580 222 L 580 460 Q 580 580 400 650 Q 220 580 220 460 L 220 222 Z"
    fill="none" stroke="url(#goldShine)" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Crown above shield -->
  <g transform="translate(400 110)">
    <!-- Crown band -->
    <rect x="-100" y="0" width="200" height="22" rx="3" fill="url(#goldShine)"/>
    <!-- Crown peaks -->
    <polygon points="-100,0 -80,-50 -55,0" fill="url(#goldShine)"/>
    <polygon points="-55,0 -25,-70 5,0" fill="url(#goldShine)"/>
    <polygon points="5,0 25,-90 50,0" fill="url(#goldShine)"/>
    <polygon points="50,0 80,-50 100,0" fill="url(#goldShine)"/>
    <!-- Crown jewels -->
    <circle cx="-80" cy="-50" r="6" fill="#7C3AED"/>
    <circle cx="-15" cy="-70" r="6" fill="#EF4444"/>
    <circle cx="25" cy="-90" r="7" fill="#22C55E"/>
    <circle cx="80" cy="-50" r="6" fill="#7C3AED"/>
    <!-- Band gem center -->
    <circle cx="0" cy="11" r="6" fill="#7C3AED" stroke="url(#goldShine)" stroke-width="1.5"/>
  </g>

  <!-- Cross at center of shield -->
  <g transform="translate(400 400)">
    <!-- Cross vertical -->
    <rect x="-12" y="-130" width="24" height="280" rx="4" fill="url(#goldShine)"/>
    <!-- Cross horizontal -->
    <rect x="-90" y="-50" width="180" height="24" rx="4" fill="url(#goldShine)"/>
    <!-- Center jewel -->
    <circle r="14" fill="#7C3AED" stroke="url(#goldShine)" stroke-width="2"/>
    <circle r="6" fill="#F5E6A7"/>
  </g>

  <!-- Laurel branches at base -->
  <g fill="url(#goldShine)" opacity="0.85" transform="translate(400 600)">
    <g transform="translate(-80 0)">
      <path d="M 0 0 Q -30 -30 -70 -20 Q -50 -10 -30 -8 Q -50 0 -70 10 Q -50 14 -30 12 Q -50 22 -70 38 Q -45 30 -25 32 Q -50 48 -70 60 Q -45 50 -20 50 Q -10 24 0 0 Z" />
    </g>
    <g transform="translate(80 0)">
      <path d="M 0 0 Q 30 -30 70 -20 Q 50 -10 30 -8 Q 50 0 70 10 Q 50 14 30 12 Q 50 22 70 38 Q 45 30 25 32 Q 50 48 70 60 Q 45 50 20 50 Q 10 24 0 0 Z" />
    </g>
  </g>

  <!-- CIER monogram below -->
  <text x="400" y="730" text-anchor="middle"
    font-family="Cinzel, serif" font-weight="900" font-size="28"
    letter-spacing="8" fill="url(#goldShine)">CIER</text>
  <text x="400" y="755" text-anchor="middle"
    font-family="Inter, sans-serif" font-weight="600" font-size="9"
    letter-spacing="6" fill="url(#goldShine)" opacity="0.6">EST. 2026</text>
</svg>
